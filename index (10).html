<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Sentinel</title>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #e4e4e7 0%, #9ca3af 100%); }
        #ui { position: absolute; top: 20px; left: 20px; color: #0369a1; font-family: monospace; font-weight: bold; pointer-events: none; font-size: 11px; letter-spacing: 2px; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">ARCHITECTURE: APEX // LATS: HYPER // LEGS: REINFORCED</div>
    
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(16, 2, 32);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, -5, 0);

        const obsMat = new THREE.MeshPhongMaterial({ color: 0x18181a, specular: 0x00aacc, shininess: 80 });
        const tenMat = new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x222222, shininess: 2, flatShading: true });
        const tiMat = new THREE.MeshPhongMaterial({ color: 0x888890, specular: 0xffffff, shininess: 120 });

        const v = (x,y,z) => new THREE.Vector3(x,y,z);
        function b(parent, p1, p2, radius, mat = obsMat) {
            const geo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3([p1, p2]), 2, radius, 12, false);
            parent.add(new THREE.Mesh(geo, mat));
            if (mat === obsMat) {
                const cap = new THREE.SphereGeometry(radius * 1.05, 12, 12);
                const m1 = new THREE.Mesh(cap, tiMat); m1.position.copy(p1);
                const m2 = new THREE.Mesh(cap, tiMat); m2.position.copy(p2);
                parent.add(m1, m2);
            }
        }

        const sent = new THREE.Group(), chest = new THREE.Group(), head = new THREE.Group();
        scene.add(sent); sent.add(chest, head);

        const topY = 3.0, botY = -2.0;
        const stT = v(0, topY - 0.5, 1.4), stM = v(0, topY - 1.6, 1.45), stB = v(0, topY - 2.8, 1.5);
        b(chest, stT, stB, 0.12);

        for (let i = 0; i <= 15; i++) {
            const y = topY - (i * ((topY - botY) / 15));
            const vert = new THREE.Mesh(new THREE.CylinderGeometry(0.16+(i*0.012), 0.16+(i*0.012), 0.3, 16), obsMat);
            vert.position.set(0, y, 0); sent.add(vert);
            if (i >= 1 && i <= 13) b(sent, v(0, y, 0), v(0, y + 0.1, -0.45), 0.08);
            if (i >= 2 && i <= 13 && (i % 2 === 0 || i === 13)) {
                const w = 1.8 - (i * 0.05), oL = v(-w, y, -0.2), oR = v(w, y, -0.2);
                const stC = new THREE.Vector3().lerpVectors(stT, stB, Math.min((i - 2) / 8, 1));
                b(chest, v(0,y,0), oL, 0.08); b(chest, v(0,y,0), oR, 0.08);
                b(chest, oL, stC, 0.08); b(chest, oR, stC, 0.08);
            }
        }

        const orbY = topY + 1.8;
        const orb = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
        orb.position.set(0, orbY, 0); head.add(orb);
        const pl = new THREE.PointLight(0x00f2ff, 1.5, 12); pl.position.set(0, orbY, 0); head.add(pl);
        
        const bCen = v(0, orbY, 0); // Re-centered for the floating filaments
        const chin = v(0, topY + 0.8, 1.4); 

        [-1, 1].forEach(x => {
            const sh = v(2.8 * x, topY + 0.2, 0);
            const cl = v(1.3 * x, topY - 0.2, 0.8);
            const sc = v(1.6 * x, topY - 1.8, -0.8);
            const el = v(3.2 * x, 0, 0.2);
            const wC = v(3.4 * x, -3.2, 0.6);
            const hip = v(1.6 * x, botY, 0);
            const kn = v(1.8 * x, -6.5, 1.2);
            const pat = v(1.8 * x, -6.6, 1.6);
            const ank = v(2.0 * x, -10.5, -0.5);
            const hl = v(2.0 * x, -10.8, -1.2);
            const bI = v(1.5 * x, -11.2, 0.8);
            const bO = v(2.5 * x, -11.2, 0.8);

            // --- TRUNK & BACK ---
            b(chest, stT, cl, 0.12); b(chest, cl, sh, 0.12); b(chest, sh, sc, 0.13);
            b(chest, v(0, topY + 0.7, -0.4), sh, 0.12, tenMat);
            b(chest, v(0, topY - 3.2, -0.2), sc, 0.22, tenMat);

            // --- REINFORCED ARMS ---
            b(sent, sh, el, 0.26); b(sent, el, wC, 0.22);
            const palm = v(wC.x, wC.y - 0.2, wC.z);
            b(sent, wC, palm, 0.18);
            [v(3.0*x, -3.6, 0.8), v(3.4*x, -4.0, 1.2), v(3.8*x, -3.8, 0.7)].forEach(fMid => {
                b(sent, palm, fMid, 0.11);
                b(sent, fMid, v(fMid.x, fMid.y - 0.5, fMid.z + 0.2), 0.09);
            });

            // --- REINFORCED LEGS ---
            b(sent, hip, kn, 0.38); b(sent, kn, ank, 0.25); b(sent, kn, pat, 0.15);
            b(sent, v(hip.x, hip.y - 0.2, hip.z + 0.3), pat, 0.18, tenMat);
            b(sent, ank, hl, 0.18); b(sent, ank, bI, 0.14); b(sent, ank, bO, 0.14);
            b(sent, bI, v(1.5 * x, -11.6, 1.6), 0.12); b(sent, bO, v(2.5 * x, -11.6, 1.6), 0.12);

            // --- HYBRID PELVIS ---
            const pCore = v(0, botY, 0.2);
            const orbit = v(1.1 * x, botY, 0.4);
            b(sent, pCore, orbit, 0.35); b(sent, orbit, hip, 0.42);
            b(sent, pCore, v(0, botY + 1.2, 0), 0.25);

            // --- FLOATING CORE HEAD ---
            const neckBase = v(0, topY, 0); 
            const headAnchor = v(0.6 * x, topY + 0.6, -0.2); 
            b(head, neckBase, headAnchor, 0.16); 

            const brow = v(1.0 * x, orbY + 1.1, 0.4);   
            const cheek = v(1.2 * x, orbY - 0.4, 0.6);  
            const rearPlate = v(0.8 * x, orbY + 0.2, -0.8); 

            b(head, headAnchor, brow, 0.12);
            b(head, headAnchor, cheek, 0.14);
            b(head, headAnchor, rearPlate, 0.10);

            const filamentEnd = new THREE.Vector3().lerpVectors(brow, bCen, 0.7);
            const cheekFilament = new THREE.Vector3().lerpVectors(cheek, bCen, 0.7);
            b(head, brow, filamentEnd, 0.04, tenMat);      
            b(head, cheek, cheekFilament, 0.04, tenMat);   
            b(head, rearPlate, v(0.2 * x, orbY, -0.4), 0.03, tenMat); 

            const jawHinge = v(0.7 * x, topY + 0.4, 1.1);
            b(head, cheek, jawHinge, 0.08, tenMat); 
            b(head, jawHinge, chin, 0.20); 
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.7)); 
        const dLight = new THREE.DirectionalLight(0xffffff, 1.2); 
        dLight.position.set(10, 20, 15); scene.add(dLight);

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            sent.rotation.y = time * 0.15;
            const breath = Math.sin(time * 2);
            chest.scale.z = 1 + breath * 0.04;
            pl.intensity = 1.0 + (breath * 0.5);

            // Pulsing Orb Logic (Now inside the loop where it belongs!)
            const orbPulse = 1.0 + Math.sin(time * 4) * 0.05;
            orb.scale.set(orbPulse, orbPulse, orbPulse);

            // Floating Head Motion
            head.position.y = Math.sin(time * 2) * 0.1;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
