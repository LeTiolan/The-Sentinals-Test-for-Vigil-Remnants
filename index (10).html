<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Lab: Apex Sandbox</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #555555; font-family: monospace; }
        #instructions {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.85); color: #00f2ff; 
            padding: 15px; border: 1px solid #00f2ff;
            pointer-events: none; line-height: 1.6;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <strong>VIGIL LAB // PROTOTYPE ZERO</strong><br><br>
        CLICK SCREEN TO LOCK MOUSE<br>
        WASD - MOVE<br>
        MOUSE - LOOK<br>
        ESC - UNLOCK MOUSE
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. LAB ENVIRONMENT SETUP ---
      const scene = new THREE.Scene();

// 0x555555 is a nice medium gray. 
// (You can also try 0x888888 for light gray, or 0x333333 for dark gray)
scene.background = new THREE.Color(0x555555);

// Make sure to change the fog to the exact same color so it blends smoothly!
scene.fog = new THREE.Fog(0x555555, 5, 40);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 15); // Started further back to see the whole unit

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(100, 50, 0x00f2ff, 0x111111);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5); // Slightly brighter for the lab
        scene.add(ambient);
        const dLight = new THREE.DirectionalLight(0xffffff, 1.2); 
        dLight.position.set(10, 20, 15); 
        scene.add(dLight);

        // --- 2. YOUR EXACT SENTINEL CODE (WRAPPED IN A CLASS) ---
        class Sentinel {
            constructor() {
                // 'sent' becomes 'this.group' so we can move the whole robot
                this.group = new THREE.Group();
                this.chest = new THREE.Group();
                this.head = new THREE.Group();
                
                this.group.add(this.chest, this.head);

                const obsMat = new THREE.MeshPhongMaterial({ color: 0x18181a, specular: 0x00aacc, shininess: 80 });
                const tenMat = new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x222222, shininess: 2, flatShading: true });
                const tiMat = new THREE.MeshPhongMaterial({ color: 0x888890, specular: 0xffffff, shininess: 120 });
                const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });

                const v = (x,y,z) => new THREE.Vector3(x,y,z);
              const b = (parent, p1, p2, radius, mat = obsMat) => {
    const geo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3([p1, p2]), 2, radius, 12, false);
    parent.add(new THREE.Mesh(geo, mat));
    if (mat === obsMat) {
        const cap = new THREE.SphereGeometry(radius * 1.05, 12, 12);
        // Changed tiMat to glowMat on the next two lines:
        const m1 = new THREE.Mesh(cap, glowMat); m1.position.copy(p1); 
        const m2 = new THREE.Mesh(cap, glowMat); m2.position.copy(p2); 
        parent.add(m1, m2);
    }
};

                const topY = 3.0, botY = -2.0;
                const stT = v(0, topY - 0.5, 1.4), stM = v(0, topY - 1.6, 1.45), stB = v(0, topY - 2.8, 1.5);
                b(this.chest, stT, stB, 0.12);

                for (let i = 0; i <= 15; i++) {
                    const y = topY - (i * ((topY - botY) / 15));
                    const vert = new THREE.Mesh(new THREE.CylinderGeometry(0.16+(i*0.012), 0.16+(i*0.012), 0.3, 16), obsMat);
                    vert.position.set(0, y, 0); this.group.add(vert);
                    if (i >= 1 && i <= 13) b(this.group, v(0, y, 0), v(0, y + 0.1, -0.45), 0.08);
                    if (i >= 2 && i <= 13 && (i % 2 === 0 || i === 13)) {
                        const w = 1.8 - (i * 0.05), oL = v(-w, y, -0.2), oR = v(w, y, -0.2);
                        const stC = new THREE.Vector3().lerpVectors(stT, stB, Math.min((i - 2) / 8, 1));
                        b(this.chest, v(0,y,0), oL, 0.08); b(this.chest, v(0,y,0), oR, 0.08);
                        b(this.chest, oL, stC, 0.08); b(this.chest, oR, stC, 0.08);
                    }
                }

                const orbY = topY + 1.8;
                this.orb = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
                this.orb.position.set(0, orbY, 0); this.head.add(this.orb);
                
                this.pl = new THREE.PointLight(0x00f2ff, 3.0, 60); 
                this.pl.position.set(0, orbY, 0); this.head.add(this.pl);
                
                // Connecting b(head...) from your script
                b(this.head, v(0, topY, 0), v(0, orbY + 0.2, -0.8), 0.1); 

                const pub = v(0, botY - 0.5, 0.5);
      const jHing = v(0, topY + 0.5, -0.2), chin = v(0, topY + 0.8, 1.6), bCen = v(0, orbY + 0.8, 1.1);
                [-1, 1].forEach(x => {
                    const sh = v(2.8 * x, topY + 0.2, 0);
                    const cl = v(1.3 * x, topY - 0.2, 0.8);
                    const sc = v(1.6 * x, topY - 1.8, -0.8);
                    const el = v(3.2 * x, 0, 0.2);
                    const wC = v(3.4 * x, -3.2, 0.6);
                    const hip = v(1.6 * x, botY, 0);
                    const kn = v(1.8 * x, -6.5, 1.2);
                    const pat = v(1.8 * x, -6.6, 1.6);
                    const ank = v(2.0 * x, -10.5, -0.5);
                    const hl = v(2.0 * x, -10.8, -1.2);
                    const bI = v(1.5 * x, -11.2, 0.8);
                    const bO = v(2.5 * x, -11.2, 0.8);
                    const jw = v(-0.6*x, topY+0.6, 0.6);
                    const chk = v(-0.8*x, orbY, 0.8);

                    // --- TRUNK & BACK ---
                    b(this.chest, stT, cl, 0.12); b(this.chest, cl, sh, 0.12); b(this.chest, sh, sc, 0.13);
                    b(this.chest, v(0, topY + 0.7, -0.4), sh, 0.12, tenMat); // Traps
                    b(this.chest, v(0, topY - 3.2, -0.2), sc, 0.22, tenMat); // Hyper-Lats
                    b(this.chest, v(0, topY - 3.9, -0.1), v(1.3 * x, topY - 2.6, -0.5), 0.14, tenMat);

                    // --- REINFORCED ARMS & ARTICULATED HANDS ---
                    b(this.group, sh, el, 0.26); // Beefy Upper Arm
                    b(this.group, el, wC, 0.22); // Solid Forearm
                    
                    const eJoint = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 8), tiMat);
                    eJoint.position.copy(el);
                    this.group.add(eJoint);

                    const palm = v(wC.x, wC.y - 0.2, wC.z);
                    b(this.group, wC, palm, 0.18); 

                    const fT = 0.11; 
                    const tM = v(3.0 * x, -3.6, 0.8);
                    b(this.group, palm, tM, fT); b(this.group, tM, v(2.8 * x, -4.0, 1.0), fT - 0.02);
                    const iM = v(3.4 * x, -4.0, 1.2);
                    b(this.group, palm, iM, fT); b(this.group, iM, v(3.4 * x, -4.6, 1.4), fT - 0.02);
                    const pM = v(3.8 * x, -3.8, 0.7);
                    b(this.group, palm, pM, fT); b(this.group, pM, v(4.0 * x, -4.2, 0.5), fT - 0.02);

                    // --- REINFORCED LEGS ---
                    b(this.group, hip, kn, 0.38); 
                    b(this.group, kn, ank, 0.25); 
                    b(this.group, kn, pat, 0.15); 
                    b(this.group, v(hip.x, hip.y - 0.2, hip.z + 0.3), pat, 0.18, tenMat); 
                    
                    b(this.group, ank, hl, 0.18); 
                    b(this.group, ank, bI, 0.14); 
                    b(this.group, ank, bO, 0.14); 
                    b(this.group, bI, v(1.5 * x, -11.6, 1.6), 0.12); 
                    b(this.group, bO, v(2.5 * x, -11.6, 1.6), 0.12); 
                    
                    // --- HYBRID ORBITAL CHASSIS ---
                    const pCore = v(0, botY, 0.2);
                    const orbit = v(1.1 * x, botY, 0.4); 
                    b(this.group, pCore, orbit, 0.35); 
                    b(this.group, orbit, hip, 0.42);   
                    b(this.group, pCore, v(0, botY + 1.2, 0), 0.25); 

            // --- FLOATING CORE ANCHORS (TIGHTER MASK) ---
                    const neckBase = v(0, topY, 0); 
                    const headAnchor = v(0.7 * x, topY + 0.6, -0.2); // Pulled neck base in
                    b(this.head, neckBase, headAnchor, 0.18); 

                    // 1. Tighter Shell Points (Hugs the orb closely)
                    const brow = v(1.2 * x, orbY + 1.2, 0.8);   // Less wide, less far forward
                    const cheek = v(1.3 * x, orbY - 0.3, 1.0);  // Pulled in closer to the cheeks
                    const rearPlate = v(1.0 * x, orbY + 0.2, -1.2); 

                    // 2. Slightly Thinner Metal Tubing
                    b(this.head, headAnchor, brow, 0.14);
                    b(this.head, headAnchor, cheek, 0.16);
                    b(this.head, headAnchor, rearPlate, 0.12);

                    // 3. Inner Filaments
                    const filamentEnd = new THREE.Vector3().lerpVectors(brow, bCen, 0.7);
                    const cheekFilament = new THREE.Vector3().lerpVectors(cheek, bCen, 0.7);
                    
                    b(this.head, brow, filamentEnd, 0.04, tenMat);      
                    b(this.head, cheek, cheekFilament, 0.04, tenMat);   
                    b(this.head, rearPlate, v(0.2 * x, orbY, -0.5), 0.03, tenMat); 

                    // 4. Snug Jaw
                    const jawHinge = v(0.9 * x, topY + 0.4, 1.3); // Pulled jaw closer to the face
                    b(this.head, cheek, jawHinge, 0.10, tenMat); 
                    b(this.head, jawHinge, chin, 0.22);
                }); // <-- This is the end of the loop
                
              // --- SCALING THE UNIT ---
const scaleFactor = 0.22; // Shrinks it to 13% of its original size
this.group.scale.set(scaleFactor, scaleFactor, scaleFactor);

// Adjust the floor offset so the feet still touch the grid perfectly
this.group.position.y = 11.6 * scaleFactor;
            }

            update(time) {
                // I disabled the constant full-body spinning so you can walk around it properly
                // this.group.rotation.y = time * 0.15; 

                const breath = Math.sin(time * 2);
                this.chest.scale.z = 1 + breath * 0.04;
                this.pl.intensity = 1.0 + (breath * 0.5);

                const orbPulse = 1.0 + Math.sin(time * 4) * 0.05;
                this.orb.scale.set(orbPulse, orbPulse, orbPulse);

                this.head.position.y = Math.sin(time * 2) * 0.1;
            }
        }

        const unit = new Sentinel();
        scene.add(unit.group);

        // --- 3. MOVEMENT CONTROLS (Identical to your main game logic) ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        function handleMovement(delta) {
            if (controls.isLocked) {
                velocity.x -= velocity.x * 5.0 * delta;
                velocity.z -= velocity.z * 5.0 * delta;

                direction.z = Number(keys['KeyW']) - Number(keys['KeyS']);
                direction.x = Number(keys['KeyD']) - Number(keys['KeyA']);
                direction.normalize();

                if (keys['KeyW'] || keys['KeyS']) velocity.z -= direction.z * 20.0 * delta;
                if (keys['KeyA'] || keys['KeyD']) velocity.x -= direction.x * 20.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = performance.now() * 0.001;

            handleMovement(delta);
            unit.update(time);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
