<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentinel Lab: Apex Sandbox</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #555555; font-family: monospace; }
        #instructions {
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.85); color: #00f2ff; 
            padding: 15px; border: 1px solid #00f2ff;
            pointer-events: none; line-height: 1.6;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="instructions">
        <strong>VIGIL LAB // PROTOTYPE ZERO</strong><br><br>
        CLICK SCREEN TO LOCK MOUSE<br>
        WASD - MOVE<br>
        MOUSE - LOOK<br>
        ESC - UNLOCK MOUSE
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. LAB ENVIRONMENT SETUP ---
      const scene = new THREE.Scene();

// 0x555555 is a nice medium gray. 
// (You can also try 0x888888 for light gray, or 0x333333 for dark gray)
scene.background = new THREE.Color(0x555555);

// Make sure to change the fog to the exact same color so it blends smoothly!
scene.fog = new THREE.Fog(0x555555, 5, 40);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 15); // Started further back to see the whole unit

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const grid = new THREE.GridHelper(100, 50, 0x00f2ff, 0x111111);
        scene.add(grid);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5); // Slightly brighter for the lab
        scene.add(ambient);
        const dLight = new THREE.DirectionalLight(0xffffff, 1.2); 
        dLight.position.set(10, 20, 15); 
        scene.add(dLight);

class Sentinel {
    constructor() {
        this.group = new THREE.Group();
        this.vertebrae = [];
        
        const obsMat = new THREE.MeshPhongMaterial({ color: 0x18181a, specular: 0x00aacc, shininess: 80 });
        const tenMat = new THREE.MeshPhongMaterial({ color: 0x111111, specular: 0x222222, shininess: 2, flatShading: true });
        const glowMat = new THREE.MeshBasicMaterial({ color: 0x00f2ff });

        this.torso = new THREE.Group(); this.group.add(this.torso);
        const topY = 3.0, botY = -2.0;
        
        this.head = new THREE.Group(); 
        this.torso.add(this.head);
        this.head.position.set(0, topY, 0); 

        this.L_Thigh = new THREE.Group(); this.torso.add(this.L_Thigh);
        this.R_Thigh = new THREE.Group(); this.torso.add(this.R_Thigh);
        this.L_Shin = new THREE.Group(); this.L_Thigh.add(this.L_Shin);
        this.R_Shin = new THREE.Group(); this.R_Thigh.add(this.R_Shin);

        this.L_Arm = new THREE.Group(); this.torso.add(this.L_Arm);
        this.R_Arm = new THREE.Group(); this.torso.add(this.R_Arm);
        this.L_Forearm = new THREE.Group(); this.L_Arm.add(this.L_Forearm);
        this.R_Forearm = new THREE.Group(); this.R_Arm.add(this.R_Forearm);

        const bRigged = (parentGroup, pivotWorld, p1, p2, radius, mat = obsMat) => {
            const localP1 = p1.clone().sub(pivotWorld);
            const localP2 = p2.clone().sub(pivotWorld);
            const geo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3([localP1, localP2]), 2, radius, 12, false);
            parentGroup.add(new THREE.Mesh(geo, mat));
            if (mat === obsMat) {
                const cap = new THREE.SphereGeometry(radius * 1.05, 12, 12);
                const m1 = new THREE.Mesh(cap, glowMat); m1.position.copy(localP1); 
                const m2 = new THREE.Mesh(cap, glowMat); m2.position.copy(localP2); 
                parentGroup.add(m1, m2);
            }
        };

        const v = (x,y,z) => new THREE.Vector3(x,y,z);
        const stT = v(0, topY - 0.5, 1.4), stB = v(0, topY - 2.8, 1.5);
        
        bRigged(this.torso, v(0,0,0), stT, stB, 0.12);
        for (let i = 0; i <= 15; i++) {
            const y = topY - (i * ((topY - botY) / 15));
            const vert = new THREE.Mesh(new THREE.CylinderGeometry(0.16+(i*0.012), 0.16+(i*0.012), 0.3, 16), obsMat);
            vert.position.set(0, y, 0); 
            this.torso.add(vert);
            this.vertebrae.push(vert);
            if (i >= 1 && i <= 13) bRigged(this.torso, v(0,0,0), v(0, y, 0), v(0, y + 0.1, -0.45), 0.08);
            if (i >= 2 && i <= 13 && (i % 2 === 0 || i === 13)) {
                const w = 1.8 - (i * 0.05), oL = v(-w, y, -0.2), oR = v(w, y, -0.2);
                const stC = new THREE.Vector3().lerpVectors(stT, stB, Math.min((i - 2) / 8, 1));
                bRigged(this.torso, v(0,0,0), v(0,y,0), oL, 0.08); bRigged(this.torso, v(0,0,0), v(0,y,0), oR, 0.08);
                bRigged(this.torso, v(0,0,0), oL, stC, 0.08); bRigged(this.torso, v(0,0,0), oR, stC, 0.08);
            }
        }

        const orbY = topY + 1.8;
        this.orb = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), glowMat);
        this.orb.position.set(0, orbY - topY, 0); 
        this.head.add(this.orb);
        this.pl = new THREE.PointLight(0x00f2ff, 3.0, 60); 
        this.pl.position.set(0, orbY - topY, 0); 
        this.head.add(this.pl);

        const chin = v(0, topY + 0.8, 1.6);
        [-1, 1].forEach(x => {
            const sh = v(2.8 * x, topY + 0.2, 0);
            const cl = v(1.3 * x, topY - 0.2, 0.8);
            const sc = v(1.6 * x, topY - 1.8, -0.8);
            const el = v(3.2 * x, 0, 0.2);
            const wC = v(3.4 * x, -3.2, 0.6);
            const hip = v(1.6 * x, botY, 0);
            const kn = v(1.8 * x, -6.5, 1.2);
            const ank = v(2.0 * x, -10.5, -0.5);
            const hl = v(2.0 * x, -10.8, -1.2);
            const bI = v(1.5 * x, -11.2, 0.8);
            const bO = v(2.5 * x, -11.2, 0.8);

            let T_Grp, S_Grp, A_Grp, F_Grp;
            if (x === 1) { 
                this.L_Thigh.position.copy(hip); this.L_Shin.position.copy(kn).sub(hip);
                this.L_Arm.position.copy(sh); this.L_Forearm.position.copy(el).sub(sh);
                T_Grp = this.L_Thigh; S_Grp = this.L_Shin; A_Grp = this.L_Arm; F_Grp = this.L_Forearm;
            } else { 
                this.R_Thigh.position.copy(hip); this.R_Shin.position.copy(kn).sub(hip);
                this.R_Arm.position.copy(sh); this.R_Forearm.position.copy(el).sub(sh);
                T_Grp = this.R_Thigh; S_Grp = this.R_Shin; A_Grp = this.R_Arm; F_Grp = this.R_Forearm;
            }

            bRigged(this.torso, v(0,0,0), stT, cl, 0.12); bRigged(this.torso, v(0,0,0), cl, sh, 0.12); bRigged(this.torso, v(0,0,0), sh, sc, 0.13);
            bRigged(this.torso, v(0,0,0), v(0, topY + 0.7, -0.4), sh, 0.12, tenMat); 
            bRigged(this.torso, v(0,0,0), v(0, topY - 3.2, -0.2), sc, 0.22, tenMat); 
            
            bRigged(A_Grp, sh, sh, el, 0.26); 
            bRigged(F_Grp, el, el, wC, 0.22); 
            const palm = v(wC.x, wC.y - 0.2, wC.z);
            bRigged(F_Grp, el, wC, palm, 0.18); 
            const fT = 0.11;
            bRigged(F_Grp, el, palm, v(3.0 * x, -3.6, 0.8), fT);
            bRigged(F_Grp, el, palm, v(3.4 * x, -4.0, 1.2), fT);
            bRigged(F_Grp, el, palm, v(3.8 * x, -3.8, 0.7), fT);

            bRigged(T_Grp, hip, hip, kn, 0.38); 
            bRigged(T_Grp, hip, kn, v(1.8 * x, -6.6, 1.6), 0.15); 
            bRigged(S_Grp, kn, kn, ank, 0.25); 
            bRigged(S_Grp, kn, ank, hl, 0.18); 
            bRigged(S_Grp, kn, ank, bI, 0.14); 
            bRigged(S_Grp, kn, ank, bO, 0.14); 

            const pCore = v(0, botY, 0.2);
            const orbit = v(1.1 * x, botY, 0.4); 
            bRigged(this.torso, v(0,0,0), pCore, orbit, 0.35); 
            bRigged(this.torso, v(0,0,0), orbit, hip, 0.42);   

            const headAnchor = v(0.7 * x, topY + 0.6, -0.2); 
            bRigged(this.head, v(0, topY, 0), v(0, topY, 0), headAnchor, 0.18); 
            const cheek = v(1.3 * x, orbY - 0.3, 1.0);  
            bRigged(this.head, v(0, topY, 0), headAnchor, v(1.2 * x, orbY + 1.2, 0.8), 0.14);
            bRigged(this.head, v(0, topY, 0), headAnchor, cheek, 0.16);
            const jawHinge = v(0.9 * x, topY + 0.4, 1.3); 
            bRigged(this.head, v(0, topY, 0), cheek, jawHinge, 0.10, tenMat); 
            bRigged(this.head, v(0, topY, 0), jawHinge, chin, 0.22);
        });
        
        const scaleFactor = 0.22; 
        this.group.scale.set(scaleFactor, scaleFactor, scaleFactor);
        this.group.position.y = 11.6 * scaleFactor;
    }

update(time, playerPosition) {
        const walkTempo = time * 3.2; 
        const rawCycle = Math.sin(walkTempo);
        const poppyCycle = Math.sign(rawCycle) * Math.pow(Math.abs(rawCycle), 0.45); 

        this.torso.position.x = Math.sin(walkTempo) * 0.25;
        this.torso.position.y = Math.pow(Math.abs(Math.cos(walkTempo)), 1.8) * 0.4; 
        this.torso.rotation.y = poppyCycle * 0.25; 
        this.torso.rotation.z = Math.sin(walkTempo) * -0.08; 

        const topSway = Math.sin(walkTempo * 0.5) * 0.15;

        if (this.vertebrae && this.vertebrae.length > 0) {
            const vLen = this.vertebrae.length;
            this.vertebrae.forEach((vert, i) => {
                const wave = Math.sin(walkTempo * 1.5 - i * 0.2) * 0.08;
                const flex = (i / vLen) * topSway;
                vert.rotation.z = wave + flex; 
                vert.position.x = (wave * 0.4) + (flex * 3.5);
            });
        }

        this.L_Arm.position.x = 2.8 + (topSway * 2.5);
        this.R_Arm.position.x = -2.8 + (topSway * 2.5);
        this.L_Arm.position.y = 3.2 - (topSway * 0.8);
        this.R_Arm.position.y = 3.2 + (topSway * 0.8);

        const legSweep = 1.1; 
        this.L_Thigh.rotation.x = poppyCycle * legSweep;
        this.R_Thigh.rotation.x = -poppyCycle * legSweep;
        
        this.L_Shin.rotation.x = Math.max(0, Math.sin(walkTempo - 0.4)) * 1.4;
        this.R_Shin.rotation.x = Math.max(0, Math.sin(walkTempo + Math.PI - 0.4)) * 1.4;

        this.L_Arm.rotation.x = -poppyCycle * 0.6 - 0.15;
        this.R_Arm.rotation.x = poppyCycle * 0.6 - 0.15;
        this.L_Forearm.rotation.z = -0.6 + poppyCycle * 0.2;
        this.R_Forearm.rotation.z = 0.6 + poppyCycle * 0.2;

        const breath = Math.sin(time * 1.5) * Math.cos(time * 0.5);
        this.torso.scale.z = 1 + breath * 0.05; 
        if (this.pl) this.pl.intensity = 1.2 + (breath * 0.8);
        if (this.orb) this.orb.scale.setScalar(1.0 + breath * 0.06);

        this.head.position.x = topSway * 3.5;
        this.head.position.y = 3.0 - this.torso.position.y * 0.8; 
        if (playerPosition) {
            const targetLocal = this.group.worldToLocal(playerPosition.clone());
            this.head.lookAt(targetLocal);
            this.head.rotation.x = Math.max(-0.4, Math.min(0.4, this.head.rotation.x));
            this.head.rotation.y = Math.max(-0.7, Math.min(0.7, this.head.rotation.y));
            this.head.rotation.z = topSway * 0.6; 
        }
    }
}

const unit = new Sentinel();
scene.add(unit.group);
        // --- 3. MOVEMENT CONTROLS (Identical to your main game logic) ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const keys = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clock = new THREE.Clock();

        function handleMovement(delta) {
            if (controls.isLocked) {
                velocity.x -= velocity.x * 5.0 * delta;
                velocity.z -= velocity.z * 5.0 * delta;

                direction.z = Number(keys['KeyW']) - Number(keys['KeyS']);
                direction.x = Number(keys['KeyD']) - Number(keys['KeyA']);
                direction.normalize();

                if (keys['KeyW'] || keys['KeyS']) velocity.z -= direction.z * 20.0 * delta;
                if (keys['KeyA'] || keys['KeyD']) velocity.x -= direction.x * 20.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = performance.now() * 0.001;

            handleMovement(delta);
          unit.update(time, camera.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
